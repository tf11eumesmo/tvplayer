<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TV Player PWA">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TV Player">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TV Player</title>
  <link rel="manifest" href="manifest.json">
  <!-- HLS/mpegts para PWA/Web sao carregados sob demanda pelo player, com fallback de CDNs. -->
<script id="tvplayer-pwa-protection">
(function () {
  'use strict';

  var blocked = false;
  function showBlockedScreen(reason) {
    if (blocked) return;
    blocked = true;
    try {
      document.documentElement.innerHTML = '';
      document.body = document.createElement('body');
      document.body.style.margin = '0';
      document.body.style.background = '#050505';
      document.body.style.color = '#ffffff';
      document.body.style.fontFamily = 'Arial, sans-serif';
      document.body.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;box-sizing:border-box;">' +
        '<div style="max-width:620px;background:#111;border:1px solid #333;border-radius:16px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,.5);">' +
        '<div style="font-size:28px;font-weight:700;margin-bottom:10px;">TV Player</div>' +
        '<div style="font-size:18px;margin-bottom:10px;">Acesso bloqueado.</div>' +
        '<div style="font-size:13px;color:#aaa;line-height:1.45;">' + String(reason || 'Dispositivo nao permitido nesta versao.') + '</div>' +
        '</div></div>';
    } catch (e) {}
  }

  function getRuntimeInfo() {
    var nav = window.navigator || {};
    var ua = String(nav.userAgent || '');
    var platform = String(nav.platform || '');
    var vendor = String(nav.vendor || '');
    var points = Number(nav.maxTouchPoints || 0);

    var isTizenSamsungTv = (/Tizen/i.test(ua) && /(SMART-TV|SmartTV|SamsungBrowser|TV)/i.test(ua)) ||
      (/SamsungBrowser/i.test(ua) && /(SMART-TV|SmartTV|Tizen|TV)/i.test(ua));
    var isLgWebOsTv = /(Web0S|WebOS|webOS|NetCast|LG Browser|LG SmartTV|Linux\/SmartTV|WebAppManager)/i.test(ua);
    var isRokuTv = /(Roku|Roku\d+X\/DVP|\/DVP-|DVP-)/i.test(ua);
    var isAndroid = /Android/i.test(ua);
    var isGenericNonAndroidSmartTv = /(SMART-TV|SmartTV|HbbTV)/i.test(ua) && !isAndroid;

    var isIphone = /iPhone|iPod/i.test(ua);
    var isIpad = /iPad/i.test(ua) ||
      (platform === 'MacIntel' && points > 1 && /Apple/i.test(vendor) && /Safari|AppleWebKit/i.test(ua));

    var isAllowedTv = isTizenSamsungTv || isLgWebOsTv || isRokuTv || isGenericNonAndroidSmartTv;
    var isAllowedIos = isIphone || isIpad;
    var allowed = isAllowedTv || isAllowedIos;

    var family = 'bloqueado';
    if (isTizenSamsungTv) family = 'samsung-tizen-tv';
    else if (isLgWebOsTv) family = 'lg-webos-tv';
    else if (isRokuTv) family = 'roku-tv';
    else if (isGenericNonAndroidSmartTv) family = 'smart-tv-nao-android';
    else if (isIphone) family = 'iphone';
    else if (isIpad) family = 'ipad-ios';

    return {
      ua: ua,
      platform: platform,
      allowed: allowed,
      isAllowedTv: isAllowedTv,
      isAllowedIos: isAllowedIos,
      isAndroid: isAndroid,
      family: family
    };
  }

  var runtime = getRuntimeInfo();

  // Esta trava existe apenas no PWA protegido/final. O PWA normal/teste continua livre.
  // Permitidos: iPhone/iPad/iOS e Smart TVs nao Android, como Samsung Tizen, LG webOS e Roku.
  if (!runtime.allowed) {
    showBlockedScreen('Esta versao do PWA funciona somente em iPhone/iOS e Smart TVs sem Android, como Samsung Tizen, LG webOS e Roku. Use a versao normal/teste para PC/Android.');
    return;
  }

  // Evita liberar Android TV/Android phone caso algum navegador misture tokens de SmartTV.
  if (runtime.isAndroid && !/tizen|web0s|webos|netcast|roku/i.test(runtime.ua)) {
    showBlockedScreen('Android nao e permitido nesta versao PWA protegida.');
    return;
  }

  try {
    if (window.top !== window.self) {
      showBlockedScreen('Uso em iframe externo bloqueado.');
      return;
    }
  } catch (e) {
    showBlockedScreen('Uso em iframe externo bloqueado.');
    return;
  }

  // No PWA protegido/final, nao deixe logs de URL ou debug expostos no console.
  try {
    var noop = function () {};
    if (window.console) {
      console.log = noop;
      console.debug = noop;
      console.info = noop;
      console.warn = noop;
      console.error = noop;
      if (console.clear) console.clear();
    }
  } catch (e) {}

  function isEditableTarget(el) {
    if (!el) return false;
    var tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || el.isContentEditable;
  }

  // Protecao final: bloqueia menu direito em qualquer lugar, inclusive campos de texto.
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }, true);

  document.addEventListener('selectstart', function (e) {
    if (!isEditableTarget(e.target)) e.preventDefault();
  }, true);

  document.addEventListener('dragstart', function (e) {
    e.preventDefault();
  }, true);

  document.addEventListener('keydown', function (e) {
    var key = String(e.key || '').toLowerCase();
    var ctrl = e.ctrlKey || e.metaKey;
    var shift = e.shiftKey;

    var blockedCombo =
      key === 'f12' ||
      (ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')) ||
      (ctrl && (key === 'u' || key === 's' || key === 'p'));

    if (blockedCombo) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);

  // Em TV real a diferenca outer/inner pode variar, entao a deteccao visual de DevTools
  // fica ativa principalmente para iPhone/iPad ou PC tentando falsificar user-agent.
  if (!runtime.isAllowedTv) {
    var lastState = false;
    setInterval(function () {
      try {
        var widthDiff = Math.abs((window.outerWidth || 0) - (window.innerWidth || 0));
        var heightDiff = Math.abs((window.outerHeight || 0) - (window.innerHeight || 0));
        var opened = widthDiff > 170 || heightDiff > 170;
        if (opened && !lastState) showBlockedScreen('DevTools ou inspecao do navegador detectada.');
        lastState = opened;
      } catch (e) {}
    }, 1000);
  }

  window.__TVPLAYER_PWA_PROTECTION__ = true;
  window.__TVPLAYER_ALLOWED_RUNTIME__ = runtime.family;
})();
</script>
<style id="tvplayer-pwa-protection-style">
html, body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
input, textarea, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
</style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
