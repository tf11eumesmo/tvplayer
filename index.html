<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TV Player PWA">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TV Player">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=65">

  <title>TV Player</title>
  <link rel="manifest" href="manifest.json">
  <!-- HLS/mpegts para PWA/Web sao carregados sob demanda pelo player, com fallback de CDNs. -->
<script id="tvplayer-pwa-protection">
(function () {
  'use strict';

  var blocked = false;
  function showNotFoundScreen() {
    if (blocked) return;
    blocked = true;
    try {
      Object.defineProperty(window, '__TVPLAYER_BLOCKED_RUNTIME__', {
        value: true,
        configurable: false,
        writable: false
      });
    } catch (e) {
      try { window.__TVPLAYER_BLOCKED_RUNTIME__ = true; } catch (_) {}
    }
    var html = '<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">' +
      '<title>404 page not found</title></head><body style="margin:0;background:#ffffff;color:#111111;font-family:Arial,sans-serif;">' +
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:400;">404 page not found</div>' +
      '</body></html>';
    try {
      document.open();
      document.write(html);
      document.close();
    } catch (e) {
      try {
        document.documentElement.innerHTML = '<head><title>404 page not found</title></head><body>404 page not found</body>';
      } catch (_) {}
    }
    try { window.stop(); } catch (e) {}
  }

  function getRuntimeInfo() {
    var nav = window.navigator || {};
    var ua = String(nav.userAgent || '');
    var platform = String(nav.platform || '');
    var vendor = String(nav.vendor || '');
    var points = Number(nav.maxTouchPoints || 0);

    var isTizenSamsungTv = (/Tizen/i.test(ua) && /(SMART-TV|SmartTV|SamsungBrowser|TV)/i.test(ua)) ||
      (/SamsungBrowser/i.test(ua) && /(SMART-TV|SmartTV|Tizen|TV)/i.test(ua));
    var isLgWebOsTv = /(Web0S|WebOS|webOS|NetCast|LG Browser|LG SmartTV|Linux\/SmartTV|WebAppManager)/i.test(ua);
    var isRokuTv = /(Roku|Roku\d+X\/DVP|\/DVP-|DVP-)/i.test(ua);
    var isAndroid = /Android/i.test(ua);
    var isWindows = /Windows|Win32|Win64|WOW64/i.test(ua) || /Win32|Win64|Windows/i.test(platform);
    var isGenericNonAndroidSmartTv = /(SMART-TV|SmartTV|HbbTV)/i.test(ua) && !isAndroid;

    var isIosMobileToken = /iPhone|iPod|iPad/i.test(ua) || /iPhone|iPod|iPad/i.test(platform);
    var isIphone = /iPhone|iPod/i.test(ua) || /iPhone|iPod/i.test(platform);
    var isIpad = /iPad/i.test(ua) || /iPad/i.test(platform) ||
      ((/MacIntel|Macintosh/i.test(platform) || /Macintosh/i.test(ua)) && points > 0 && /Apple|^$/i.test(vendor) && /Safari|AppleWebKit/i.test(ua));
    var isIosBrowserToken = /(CriOS|FxiOS|EdgiOS|OPiOS|Version\/.*Mobile.*Safari|Mobile\/.*Safari)/i.test(ua);
    var isAppleMobileLike = /AppleWebKit/i.test(ua) && !/Android|Windows|Linux x86_64|CrOS|Tizen|Web0S|WebOS|webOS|Roku/i.test(ua) &&
      (points > 0 || /Mobile/i.test(ua) || Math.min(screen.width || 0, screen.height || 0) <= 820);
    var isIos = isIosMobileToken || isIphone || isIpad ||
      (isIosBrowserToken && isAppleMobileLike) ||
      (/Apple/i.test(vendor) && isAppleMobileLike);

    var isAllowedTv = isTizenSamsungTv || isLgWebOsTv || isRokuTv || isGenericNonAndroidSmartTv;
    var isAllowedIos = isIos;
    var isAllowedWindowsTest = isWindows; // TEMPORARIO v66: Windows liberado apenas para testar o PWA protegido.
    var allowed = isAllowedTv || isAllowedIos || isAllowedWindowsTest;

    var family = 'bloqueado';
    if (isTizenSamsungTv) family = 'samsung-tizen-tv';
    else if (isLgWebOsTv) family = 'lg-webos-tv';
    else if (isRokuTv) family = 'roku-tv';
    else if (isGenericNonAndroidSmartTv) family = 'smart-tv-nao-android';
    else if (isIphone) family = 'iphone';
    else if (isIpad) family = 'ipad-ios';
    else if (isIos) family = 'ios';
    else if (isAllowedWindowsTest) family = 'windows-teste-temporario';

    return {
      ua: ua,
      platform: platform,
      allowed: allowed,
      isAllowedTv: isAllowedTv,
      isAllowedIos: isAllowedIos,
      isAndroid: isAndroid,
      isWindows: isWindows,
      isAllowedWindowsTest: isAllowedWindowsTest,
      isIos: isIos,
      family: family
    };
  }

  var runtime = getRuntimeInfo();

  // Esta trava existe apenas no PWA protegido/final. O PWA normal/teste continua livre.
  // Permitidos: iPhone/iPad/iOS, Smart TVs nao Android e Windows temporariamente para teste.
  if (!runtime.allowed) {
    showNotFoundScreen();
    return;
  }

  // Evita liberar Android TV/Android phone caso algum navegador misture tokens de SmartTV.
  if (runtime.isAndroid && !/tizen|web0s|webos|netcast|roku/i.test(runtime.ua)) {
    showNotFoundScreen();
    return;
  }

  // O bloqueio de iframe fica nos headers (frame-ancestors).
  // Evito bloquear via JavaScript aqui para nao dar falso positivo em iPhone/PWA/Smart TV.

  // No PWA protegido/final, nao deixe logs de URL ou debug expostos no console.
  try {
    var noop = function () {};
    if (window.console) {
      console.log = noop;
      console.debug = noop;
      console.info = noop;
      console.warn = noop;
      console.error = noop;
      if (console.clear) console.clear();
    }
  } catch (e) {}

  function isEditableTarget(el) {
    if (!el) return false;
    var tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || el.isContentEditable;
  }

  // Protecao final: bloqueia menu direito em qualquer lugar, inclusive campos de texto.
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }, true);

  document.addEventListener('selectstart', function (e) {
    if (!isEditableTarget(e.target)) e.preventDefault();
  }, true);

  document.addEventListener('dragstart', function (e) {
    e.preventDefault();
  }, true);

  document.addEventListener('keydown', function (e) {
    var key = String(e.key || '').toLowerCase();
    var ctrl = e.ctrlKey || e.metaKey;
    var shift = e.shiftKey;

    var blockedCombo =
      key === 'f12' ||
      (ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')) ||
      (ctrl && (key === 'u' || key === 's' || key === 'p'));

    if (blockedCombo) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);

  // Em TV real e no iPhone/iPad a diferenca outer/inner pode variar por causa da UI do sistema/navegador.
  // Por isso a deteccao visual por tamanho fica desativada nos dispositivos permitidos.
  // A protecao por F12/atalhos/botao direito continua ativa.
  if (!runtime.isAllowedTv && !runtime.isAllowedIos) {
    var lastState = false;
    setInterval(function () {
      try {
        var widthDiff = Math.abs((window.outerWidth || 0) - (window.innerWidth || 0));
        var heightDiff = Math.abs((window.outerHeight || 0) - (window.innerHeight || 0));
        var opened = widthDiff > 170 || heightDiff > 170;
        if (opened && !lastState) showNotFoundScreen();
        lastState = opened;
      } catch (e) {}
    }, 1000);
  }

  window.__TVPLAYER_PWA_PROTECTION__ = true;
  window.__TVPLAYER_ALLOWED_RUNTIME__ = runtime.family;
})();
</script>
<style id="tvplayer-pwa-protection-style">
html, body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
input, textarea, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
</style>
</head>
<body>
  <script id="tvplayer-flutter-bootstrap-guard">
(function () {
  if (window.__TVPLAYER_BLOCKED_RUNTIME__) return;
  var s = document.createElement('script');
  s.src = 'flutter_bootstrap.js';
  s.async = true;
  document.body.appendChild(s);
})();
</script>
</body>
</html>
